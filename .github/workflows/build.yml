name: build
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            bin: bfg-linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            bin: bfg-linux-arm64
          - os: windows-latest
            rid: win-x64
            bin: bfg-win-x64.exe
          - os: windows-latest
            rid: win-arm64
            bin: bfg-win-arm64.exe
          - os: macos-latest
            rid: osx-arm64
            bin: bfg-osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: read version
        id: version
        shell: bash
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: setup .net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: install dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: make binary
        run: dotnet publish -r ${{ matrix.rid }} -c Release -p:PublishAot=true -o ./publish

      - name: rename binary
        id: rename
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BASE="${{ matrix.bin }}"
          if [ "${{ runner.os }}" == "Windows" ]; then
            VERSIONED="${BASE%.exe}-v${VERSION}.exe"
            mv ./publish/*.exe "./publish/$VERSIONED"
          else
            VERSIONED="${BASE}-v${VERSION}"
            mv $(find ./publish -maxdepth 1 -type f ! -name "*.*") "./publish/$VERSIONED"
          fi
          echo "filename=$VERSIONED" >> $GITHUB_OUTPUT

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.filename }}
          path: ./publish/${{ steps.rename.outputs.filename }}

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: ./artifacts/*
